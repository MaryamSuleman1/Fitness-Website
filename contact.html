<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Powercore Gym</title>
</head>

<body bgcolor="#E7D9D0">
    <header>
        <center>
            <table align="center">
                <td>
                    <img src="Images/logo.jpg" alt="." width="40" style="border-radius: 40%;">
                </td>
                <td align="center">
                    <h1>
                        <font color="A62108"> POWERCORE GYM </font>
                    </h1>
                </td>

            </table>
            <nav align="center">
                <a href="index.html">Home</a> &nbsp; | &nbsp;
                <a href="about.html"> About Us</a> &nbsp; |&nbsp;
                <a href="gallery.html"> Our gallery</a> &nbsp; | &nbsp;
                <a href="contact.html">Contact Us</a>
            </nav>
            <hr width="60%">
        </center>
    </header>
    <hr>
    <main>
        <h2>Membership / Contact Form</h2>
        <form action="">
            <table cellpadding="10">
                <tr>
                    <td colspan="2">
                        <fieldset>
                            <legend>Personal Details</legend>
                            <table>
                                <tr>
                                    <td> <label for="name">Full name:</label></td>
                                    <td><input type="text" id="name" name="Full name"
                                            placeholder="Enter your full name">
                                    </td>
                                </tr>
                                <tr>
                                    <td><label for="email">Email:</label></td>
                                    <td><input type="text" id="email" name="Email" placeholder="Enter your email"></td>
                                </tr>
                                <tr>
                                    <td><label for="phone">Phone:</label></td>
                                    <td><input type="tel" id="phone" name="Phone" placeholder="Enter your phone number">
                                    </td>
                                </tr>
                                <tr>
                                    <td><label for="gender">Gender:</label></td>
                                    <td>
                                        <input type="radio" name="gender" id="male" value="Male">
                                        <label for="male">Male</label>
                                        <input type="radio" id="female" name="gender" value="Female">
                                        <label for="female">Female</label>
                                        <input type="radio" id="other" name="gender" value="Other">
                                        <label for="other">Other</label>
                                    </td>
                                </tr>
                            </table>
                        </fieldset>
                <tr>
                    <td colspan="2">
                        <fieldset>
                            <legend>Membership / Services</legend>
                            <input type="checkbox" id="personal" name="services" value="Personal Training">
                            <label for="personal">Personal Training</label><br>

                            <input type="checkbox" id="group" name="services" value="Group Classes">
                            <label for="group">Group Classes</label><br>

                            <input type="checkbox" id="nutrition" name="services" value="Nutrition Guidance">
                            <label for="nutrition">Nutrition Guidance</label><br>

                            <input type="checkbox" id="yoga" name="services" value="Yoga & Pilates">
                            <label for="yoga">Yoga & Pilates</label><br>

                            <input type="checkbox" id="weight" name="services" value="Weight Management">
                            <label for="weight">Weight Management</label>
                        </fieldset>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <fieldset>
                            <legend>City</legend>
                            <label for="city">Select your City</label>
                            <select name="city" id="city">
                                <option value="Karachi">Karachi</option>
                                <option value="Lahore">Lahore</option>
                                <option value="Islamabad">Islamabad</option>
                                <option value="Faisalabad">Faisalabad</option>
                                <option value="Quetta">Quetta</option>
                            </select>
                        </fieldset>
                    </td>
                </tr>

                <tr>
                    <td>
                        <fieldset>
                            <legend>Message</legend>
                            <textarea name="Message" id="Message" placeholder="Write your message" rows="5"
                                cols="34"></textarea>
                        </fieldset>
                    </td>
                </tr>

                <tr>
                    <td>
                        <button>submit</button>
                    </td>
                </tr>

                </td>
                </tr>
            </table>
        </form>
    </main> <br><br>
    <center>
    <hr width="60%">
     <footer>
        <center>
            <p>© 2026 Powercore Gym</p>
        </center>
    </footer>

</center>
</body>
</body>

</html>
